server {
    listen 80 default_server;
    listen [::]:80 default_server;
    root /var/www/html;
    index index.html;

    server_name victim-web;

    add_header X-Powered-By "PHP/8.0.28" always;
    add_header Link "</wp-json/>; rel=\"https://api.w.org/\"" always;

    location = /wp-login.php {
        default_type text/html;
        return 200 '<html><head><title>WordPress Login</title></head><body><h1>Log In</h1><form><input name="log"><input name="pwd" type="password"></form></body></html>';
    }

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /wp-admin/\nDisallow: /donate.php\n";
    }

    location = /wp-users.json {
        default_type application/json;
        try_files $uri =404;
    }

    location = / {
        if ($arg_rest_route ~ "^/wp/v2/users/?$") {
            rewrite ^ /wp-users.json last;
        }
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
